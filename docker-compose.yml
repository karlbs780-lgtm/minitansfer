services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    # The backend reaches Mongo over the internal Compose network (host name "mongodb").
    # Published on host port 27018 to avoid clashing with any local MongoDB already on 27017.
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/minitransfer
      # Override these in a real deployment.
      JWT_SECRET: change-me-in-production-0123456789-abcdefghijklmnopqrstuvwxyz
      JWT_EXPIRATION_MS: "86400000"
      INITIAL_BALANCE: "10000"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
